services:
  # GhostShelf Backend
  backend:
    build: ./backend
    container_name: ghostshelf-backend
    restart: unless-stopped
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=sqlite+aiosqlite:////data/ghostshelf.db
      - WIZARR_DB_PATH=/wizarr-db/database.db
      - CORS_ORIGINS=http://localhost:4141,http://frontend,http://localhost:5690
      - CWA_URL=
      - KOMGA_URL=
      - COMIC_INGEST_FOLDER=/media/comics
      - MANGA_INGEST_FOLDER=/media/manga
      - CWA_INGEST_FOLDER=/media/book-ingest
      - PROWLARR_URL=
      - PROWLARR_API_KEY=
      - QBITTORRENT_URL=
      - QBITTORRENT_USERNAME=
      - QBITTORRENT_PASSWORD=
      - GOOGLE_BOOKS_API_KEY=
      - COMICVINE_API_KEY=
    volumes:
      - ghostshelf-data:/data
      # Read-only mount to Wizarr database for auth
      - /opt/yams/config/wizarr/database:/wizarr-db:ro
      # Media directories
      - /media/MediaPool/comics:/media/comics
      - /media/MediaPool/manga:/media/manga
      - /media/MediaPool/book-ingest:/media/book-ingest
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # GhostShelf Frontend
  frontend:
    build: ./frontend
    container_name: ghostshelf-frontend
    restart: unless-stopped
    ports:
      - "4141:80"
    depends_on:
      - backend

volumes:
  ghostshelf-data:
