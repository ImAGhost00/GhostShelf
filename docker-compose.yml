services:
  backend:
    build: ./backend
    container_name: ghostshelf-backend
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=sqlite+aiosqlite:////data/ghostshelf.db
      - CORS_ORIGINS=http://localhost:4140,http://frontend
    volumes:
      - ghostshelf-data:/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: ghostshelf-frontend
    restart: unless-stopped
    ports:
      - "4140:80"
    depends_on:
      - backend

volumes:
  ghostshelf-data:
