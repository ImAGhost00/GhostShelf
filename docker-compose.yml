services:
  backend:
    build: ./backend
    container_name: ghostshelf-backend
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=sqlite+aiosqlite:////data/ghostshelf.db
      - CORS_ORIGINS=http://localhost:3000,http://frontend
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-}
      - COMICVINE_API_KEY=${COMICVINE_API_KEY:-}
      - CWA_URL=${CWA_URL:-}
      - CWA_INGEST_FOLDER=${CWA_INGEST_FOLDER:-}
      - KOMGA_INGEST_FOLDER=${KOMGA_INGEST_FOLDER:-}
      - KOMGA_URL=${KOMGA_URL:-}
      - KOMGA_USERNAME=${KOMGA_USERNAME:-}
      - KOMGA_PASSWORD=${KOMGA_PASSWORD:-}
      - PROWLARR_URL=${PROWLARR_URL:-}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
    volumes:
      - ghostshelf-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: ghostshelf-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  ghostshelf-data:
